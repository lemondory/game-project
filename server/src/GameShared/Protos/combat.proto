syntax = "proto3";

option csharp_namespace = "GameShared.Proto";

// Combat packets

message C2S_Attack {
  int64 target_entity_id = 1;
}

message S2C_Attack {
  int64 attacker_entity_id = 1;
  int64 target_entity_id = 2;
}

message S2C_Damage {
  int64 target_entity_id = 1;
  int32 damage = 2;
  int32 current_hp = 3;
  int32 max_hp = 4;
}

message S2C_Death {
  int64 entity_id = 1;
  int64 killer_entity_id = 2;
}

message S2C_RewardResult {
  int32 exp_reward = 1;
  int32 gold_reward = 2;
  int32 total_exp = 3;
  int32 total_gold = 4;
}

message S2C_LevelUp {
  int32 new_level = 1;
  int32 new_max_hp = 2;
  int32 new_attack = 3;
  int32 new_defense = 4;
}
