syntax = "proto3";

option csharp_namespace = "GameShared.Proto";

// Combat packets

message C2S_Attack {
  int64 target_entity_id = 1;
}

message S2C_Attack {
  int64 attacker_entity_id = 1;
  int64 target_entity_id = 2;
}

message S2C_Damage {
  int64 target_entity_id = 1;
  int32 damage = 2;
  int32 current_hp = 3;
  int32 max_hp = 4;
}

message S2C_Death {
  int64 entity_id = 1;
  int64 killer_entity_id = 2;
}
