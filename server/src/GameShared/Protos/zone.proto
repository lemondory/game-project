syntax = "proto3";

import "common.proto";

option csharp_namespace = "GameShared.Proto";

// Zone entry packets

message C2S_EnterTown {
  // Empty message - no fields needed
}

message S2C_EnterTownResult {
  bool success = 1;
  int64 entity_id = 2;
  Vec3 position = 3;
  repeated EntityInfo nearby_entities = 4;
}

message C2S_EnterDungeon {
  int32 dungeon_id = 1;
}

message S2C_EnterDungeonResult {
  bool success = 1;
  string message = 2;
  int64 entity_id = 3;
  Vec3 position = 4;
  repeated EntityInfo nearby_entities = 5;
}

message C2S_LeaveDungeon {
  // 클라이언트가 명시적으로 던전 퇴장을 요청
}

message S2C_LeaveDungeon {
  bool success = 1;
}

message S2C_DungeonClear {
  int32 dungeon_id = 1;
  int32 clear_time_seconds = 2; // 클리어 소요 시간 (KillAll: 실제 소요, Timed: 제한 시간)
  bool  is_cleared = 3;         // true=클리어, false=시간 초과 실패 (KillAll 전용)
  int32 kill_count = 4;         // 처치한 몬스터 수
}

message S2C_DungeonTimerUpdate {
  int32 remaining_seconds = 1;  // 남은 시간 (초)
  int32 kill_count = 2;         // 현재 킬카운트
}

// 시간제 사냥터 패킷

message C2S_EnterField {
  int32 field_id = 1;
}

message S2C_EnterFieldResult {
  bool   success = 1;
  string message = 2;
  int64  entity_id = 3;
  Vec3   position = 4;
  repeated EntityInfo nearby_entities = 5;
  int32  daily_remaining_seconds = 6;   // 오늘 남은 입장 가능 시간(초)
  int32  weekly_remaining_seconds = 7;  // 이번 주 남은 입장 가능 시간(초)
}

message C2S_LeaveField {
  // 명시적 퇴장 요청
}

message S2C_LeaveField {
  bool success = 1;
}

message S2C_FieldQuotaUpdate {
  int32 daily_remaining_seconds  = 1;  // 남은 일일 시간(초) — 1분마다 전송
  int32 weekly_remaining_seconds = 2;
}

message C2S_Respawn {
  // 현재 존에서 입구로 부활 요청
}

message S2C_RespawnResult {
  bool success  = 1;
  Vec3 position = 2;  // 부활 위치 (입구)
  int32 current_hp = 3;
  int32 max_hp     = 4;
}

// 채집 오브젝트 패킷

message ObjectReward {
  int32 item_id    = 1;
  int32 item_count = 2;
  int32 exp_reward = 3;
}

message S2C_ObjectInfo {
  int32  object_id                = 1;  // 런타임 고유 ID (ZoneManager 내 순번)
  int32  data_id                  = 2;  // WorldObjectData.ObjectId
  Vec3   position                 = 3;
  int32  state                    = 4;  // WorldObjectState (0=Available, 1=Harvested, 2=Respawning)
  int32  respawn_remaining_seconds = 5; // Harvested/Respawning 상태일 때 남은 시간
}

message S2C_ObjectState {
  int32 object_id                = 1;
  int32 state                    = 2;
  int32 respawn_remaining_seconds = 3;
}

message C2S_Interact {
  int32 target_object_id = 1;
}

message S2C_InteractResult {
  int32         object_id = 1;
  bool          success   = 2;
  string        message   = 3;
  ObjectReward  reward    = 4;
}
